<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page not found — Manasa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800&family=Inter:wght@400;500&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root{
    --color-bg:#F6F8FB; --color-navy:#0A2540; --color-azure:#2F6FED;
    --color-slate:#48566B; --color-border:#E3E8F0;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:'Inter',sans-serif;background:var(--color-bg);color:var(--color-slate);
    min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:24px;
  }
  .code{font-family:'IBM Plex Mono',monospace;color:var(--color-azure);font-size:14px;letter-spacing:.1em;margin-bottom:18px;}
  h1{font-family:'Sora',sans-serif;font-weight:800;color:var(--color-navy);font-size:clamp(32px,6vw,52px);}
  p{margin-top:14px;font-size:15px;max-width:380px;}
  a{
    margin-top:32px;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#fff;
    background:var(--color-navy);padding:12px 22px;border-radius:6px;text-decoration:none;
  }
  a:hover{background:var(--color-azure);}
</style>
</head>
<body>
  <div class="code">ERROR 404</div>
  <h1>This page didn't ship.</h1>
  <p>The page you're looking for doesn't exist. Let's get you back to the main site.</p>
  <a href="/">Back to home</a>
</body>
</html>
